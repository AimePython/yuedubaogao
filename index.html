<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场洞察 · 省级运营报告</title>
    <style>
        :root {
            --accent: #2c7da0;
            --accent-dark: #1e5f7a;
            --bg: #f0f4f8;
            --text: #1a2c3e;
            --muted: #5a7688;
            --card: #fff;
            --border: #e2edf2;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: clamp(1rem, 4vw, 2rem);
        }
        .wrap {
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 1rem;
        }
        h1 {
            font-size: clamp(1.35rem, 4vw, 1.75rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        header p {
            margin-top: 0.35rem;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .search-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            align-items: center;
        }
        .search-row label {
            font-size: 0.85rem;
            color: var(--muted);
            width: 100%;
        }
        input[type="search"] {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        input[type="search"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
        }
        .hint {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .ai-card {
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
        }
        .ai-card h2 {
            font-size: 1.05rem;
            margin-bottom: 0.35rem;
        }
        .ai-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 0.65rem;
            margin-bottom: 0.65rem;
        }
        .ai-row input, .ai-row select {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
            font-size: 0.92rem;
            background: #fff;
            color: var(--text);
        }
        .ai-row input {
            flex: 1;
            min-width: 260px;
        }
        .ai-row button {
            border: 0;
            border-radius: 10px;
            padding: 0.65rem 0.95rem;
            font-size: 0.92rem;
            font-weight: 600;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }
        .ai-row button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .ai-answer {
            white-space: pre-wrap;
            line-height: 1.65;
            background: #f8fbfd;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem;
            min-height: 72px;
            font-size: 0.92rem;
        }
        .ai-sources {
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.65rem;
        }
        .province-card {
            display: block;
            padding: 0.85rem 0.75rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }
        .province-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 125, 160, 0.12);
            border-color: var(--accent);
        }
        .province-card:active {
            transform: translateY(0);
        }
        .province-card.available {
            border-left: 4px solid var(--accent);
        }
        .province-card.available::after {
            content: '查看报告';
            display: block;
            margin-top: 0.35rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
        }
        .province-card.comingsoon {
            border-left: 4px solid #c7d4dd;
            color: var(--muted);
            background: #f7fafc;
        }
        .province-card.comingsoon:hover {
            transform: none;
            box-shadow: none;
            border-color: #c7d4dd;
        }
        .province-card.comingsoon::after {
            content: '待上线';
            display: block;
            margin-top: 0.35rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8aa0ae;
        }
        .province-card:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }
        .province-card.hidden {
            display: none;
        }
        .empty-state {
            display: none;
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }
        .empty-state.show {
            display: block;
        }
        footer {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>市场运营分析 · 省级报告</h1>
            <p>在下方搜索或点击行政区名称。进入省份后可按年月查询对应报告（未上线会提示暂无）。</p>
        </header>

        <div class="search-row">
            <label for="q">搜索省、自治区、直辖市或关键词</label>
            <input id="q" type="search" placeholder="例如：山东、新疆、内蒙古…" autocomplete="off" enterkeyhint="search">
        </div>
        <section class="ai-card">
            <h2>AI 智能问答</h2>
            <p class="hint">问题会从各省报告 HTML 中检索后回答，可选择省份缩小范围。</p>
            <div class="ai-row">
                <select id="qaProvince">
                    <option value="">全部省份</option>
                </select>
                <input id="qaQuestion" type="search" placeholder="例如：甘肃1月出清电量变化趋势是什么？" autocomplete="off">
                <button id="qaAskBtn" type="button">提问</button>
            </div>
            <div class="ai-answer" id="qaAnswer">等待提问…</div>
            <div class="ai-sources" id="qaSources"></div>
        </section>
        <p class="hint" id="countHint">共 31 个省级行政区</p>

        <div class="grid" id="grid" aria-live="polite"></div>
        <p class="empty-state" id="empty">未匹配到行政区，请尝试其他关键词。</p>

        <footer>市场洞察网站 · 数据仅供参考</footer>
    </div>

    <script>
        // 31 个省级行政区（省 / 自治区 / 直辖市），与国家统计局常用口径一致
        const PROVINCES = [
            { name: '北京市', slug: 'beijing' },
            { name: '天津市', slug: 'tianjin' },
            { name: '河北省', slug: 'hebei' },
            { name: '山西省', slug: 'shanxi' },
            { name: '内蒙古自治区', slug: 'neimenggu' },
            { name: '辽宁省', slug: 'liaoning' },
            { name: '吉林省', slug: 'jilin' },
            { name: '黑龙江省', slug: 'heilongjiang' },
            { name: '上海市', slug: 'shanghai' },
            { name: '江苏省', slug: 'jiangsu' },
            { name: '浙江省', slug: 'zhejiang' },
            { name: '安徽省', slug: 'anhui' },
            { name: '福建省', slug: 'fujian' },
            { name: '江西省', slug: 'jiangxi' },
            { name: '山东省', slug: 'shandong' },
            { name: '河南省', slug: 'henan' },
            { name: '湖北省', slug: 'hubei' },
            { name: '湖南省', slug: 'hunan' },
            { name: '广东省', slug: 'guangdong' },
            { name: '广西壮族自治区', slug: 'guangxi' },
            { name: '海南省', slug: 'hainan' },
            { name: '重庆市', slug: 'chongqing' },
            { name: '四川省', slug: 'sichuan' },
            { name: '贵州省', slug: 'guizhou' },
            { name: '云南省', slug: 'yunnan' },
            { name: '西藏自治区', slug: 'xizang' },
            { name: '陕西省', slug: 'shanxi1' },
            { name: '甘肃省', slug: 'gansu' },
            { name: '青海省', slug: 'qinghai' },
            { name: '宁夏回族自治区', slug: 'ningxia' },
            { name: '新疆维吾尔自治区', slug: 'xinjiang' }
        ];

        const grid = document.getElementById('grid');
        const q = document.getElementById('q');
        const empty = document.getElementById('empty');
        const countHint = document.getElementById('countHint');
        const qaProvince = document.getElementById('qaProvince');
        const qaQuestion = document.getElementById('qaQuestion');
        const qaAskBtn = document.getElementById('qaAskBtn');
        const qaAnswer = document.getElementById('qaAnswer');
        const qaSources = document.getElementById('qaSources');

        // 方案B: 前端静态托管 + 后端独立部署（可通过全局变量或 URL 参数覆盖）
        const API_BASE =
            new URLSearchParams(window.location.search).get('api_base') ||
            window.__QA_API_BASE__ ||
            'https://yuedubaogao.onrender.com';

        let reports = {};
        let qaCorpus = null;

        function apiUrl(path) {
            const base = (API_BASE || '').trim();
            if (!base) return path; // 本地同源
            return base.replace(/\/+$/, '') + path;
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 45000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { ...options, signal: controller.signal });
            } finally {
                clearTimeout(timer);
            }
        }

        async function postAskWithRetry(payload, retries = 1) {
            let lastError = null;
            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const res = await fetchWithTimeout(
                        apiUrl('/api/ask'),
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        },
                        45000
                    );
                    return res;
                } catch (err) {
                    lastError = err;
                    if (attempt < retries) {
                        // 给 Render 冷启动一点缓冲
                        await new Promise((r) => setTimeout(r, 1200));
                    }
                }
            }
            throw lastError || new Error('请求失败');
        }

        function hasReport(slug) {
            const p = reports?.[slug];
            return p && Object.keys(p).length > 0;
        }

        function render() {
            const term = (q.value || '').trim().toLowerCase();
            grid.innerHTML = '';
            let visible = 0;

            PROVINCES.forEach((p) => {
                const match = !term || p.name.toLowerCase().includes(term);
                const a = document.createElement('a');
                a.href = 'province.html?province=' + encodeURIComponent(p.slug);
                a.className = 'province-card' + (hasReport(p.slug) ? ' available' : ' comingsoon');
                a.textContent = p.name;

                if (!match) a.classList.add('hidden');
                else visible++;

                grid.appendChild(a);
            });

            empty.classList.toggle('show', visible === 0);
            countHint.textContent =
                term ? '当前筛选：' + visible + ' / 31 个行政区' : '共 31 个省级行政区';
        }

        function initQaProvinceOptions() {
            PROVINCES.forEach((p) => {
                const opt = document.createElement('option');
                opt.value = p.slug;
                opt.textContent = p.name;
                qaProvince.appendChild(opt);
            });
        }

        function qaTokenize(text) {
            const tokens = (text.toLowerCase().match(/[\u4e00-\u9fff]{2,}|[a-z0-9]{2,}/g) || []);
            return Array.from(new Set(tokens));
        }

        function stripHtml(html) {
            return html
                .replace(/<script[\s\S]*?<\/script>/gi, ' ')
                .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                .replace(/<[^>]+>/g, ' ')
                .replace(/&nbsp;|&#160;/g, ' ')
                .replace(/&amp;/g, '&')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function extractSnippet(text, question, maxLen = 220) {
            const tokens = qaTokenize(question);
            let pos = -1;
            for (const tk of tokens) {
                const i = text.toLowerCase().indexOf(tk);
                if (i >= 0) {
                    pos = i;
                    break;
                }
            }
            if (pos < 0) return text.slice(0, maxLen) + (text.length > maxLen ? '...' : '');
            const start = Math.max(0, pos - Math.floor(maxLen / 3));
            const end = Math.min(text.length, start + maxLen);
            return (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
        }

        function splitSentences(text) {
            return text
                .split(/[。！？；\n]/)
                .map((s) => s.trim())
                .filter(Boolean);
        }

        function isMostlyNumeric(sentence) {
            const compact = sentence.replace(/\s+/g, '');
            if (!compact) return true;
            const numericLike = (compact.match(/[0-9.%\-+]/g) || []).length;
            return numericLike / compact.length > 0.45;
        }

        function scoreSentence(sentence, qTokens) {
            const lower = sentence.toLowerCase();
            let score = 0;
            qTokens.forEach((t) => {
                if (lower.includes(t)) score += 2;
            });
            if (/(同比|环比|增长|下降|上升|峰|谷|最高|最低|负荷|电量|价格)/.test(sentence)) score += 2;
            if (sentence.length >= 18 && sentence.length <= 160) score += 1;
            if (isMostlyNumeric(sentence)) score -= 2;
            return score;
        }

        async function buildQaCorpus() {
            if (qaCorpus) return qaCorpus;
            const docs = [];
            const tasks = [];
            Object.entries(reports || {}).forEach(([slug, monthMap]) => {
                Object.values(monthMap || {}).forEach((entry) => {
                    const file = typeof entry === 'string' ? entry : entry?.file;
                    if (!file) return;
                    tasks.push({ slug, file });
                });
            });
            for (const t of tasks) {
                try {
                    const res = await fetch(encodeURI(t.file), { cache: 'no-store' });
                    if (!res.ok) continue;
                    const html = await res.text();
                    const text = stripHtml(html);
                    if (!text) continue;
                    docs.push({
                        slug: t.slug,
                        file: t.file,
                        text,
                        tokens: qaTokenize(text),
                        sentences: splitSentences(text)
                    });
                } catch (_) {
                    // 忽略单文件失败，继续构建其余语料
                }
            }
            qaCorpus = docs;
            return qaCorpus;
        }

        async function fallbackAsk(question, province) {
            const docs = await buildQaCorpus();
            const scoped = province ? docs.filter((d) => d.slug === province) : docs;
            const qTokens = new Set(qaTokenize(question));
            const scoredDocs = scoped
                .map((d) => {
                    let score = 0;
                    d.tokens.forEach((t) => {
                        if (qTokens.has(t)) score += 1;
                    });
                    return { score, doc: d };
                })
                .filter((x) => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 3);

            if (!scoredDocs.length) {
                return {
                    answer: '未在现有省份报告中检索到直接相关内容，请换个问法或指定省份。',
                    sources: [],
                    mode: 'retrieval-fallback'
                };
            }

            const candidateFacts = [];
            scoredDocs.forEach(({ doc }) => {
                (doc.sentences || []).forEach((s) => {
                    const score = scoreSentence(s, qTokens);
                    if (score > 0) candidateFacts.push({ score, sentence: s, doc });
                });
            });
            candidateFacts.sort((a, b) => b.score - a.score);

            const picked = [];
            const seen = new Set();
            for (const c of candidateFacts) {
                if (picked.length >= 3) break;
                const key = c.sentence.slice(0, 36);
                if (seen.has(key)) continue;
                seen.add(key);
                picked.push(c);
            }

            const lines = ['当前为静态站点兜底检索回答（未连接后端 Agent）：'];
            const sources = [];
            if (picked.length) {
                picked.forEach(({ sentence, doc }) => {
                    const name = PROVINCES.find((p) => p.slug === doc.slug)?.name || doc.slug;
                    lines.push(`- ${sentence}`);
                    sources.push({ province: name, file: doc.file });
                });
            } else {
                scoredDocs.forEach(({ score, doc }) => {
                    const name = PROVINCES.find((p) => p.slug === doc.slug)?.name || doc.slug;
                    lines.push(`- ${name}（相关度 ${score}）：${extractSnippet(doc.text, question)}`);
                    sources.push({ province: name, file: doc.file });
                });
            }

            // 去重来源
            const dedup = [];
            const srcSeen = new Set();
            sources.forEach((s) => {
                const k = `${s.province}|${s.file}`;
                if (!srcSeen.has(k)) {
                    srcSeen.add(k);
                    dedup.push(s);
                }
            });
            if (!picked.length) {
                return { answer: lines.join('\n'), sources: dedup, mode: 'retrieval-fallback' };
            }
            lines.push('（以上为与问题最相关的报告原文句子提取）');
            return { answer: lines.join('\n'), sources: dedup, mode: 'retrieval-fallback' };
        }

        async function askQuestion() {
            const question = (qaQuestion.value || '').trim();
            const province = (qaProvince.value || '').trim();
            if (!question) {
                qaAnswer.textContent = '请先输入问题。';
                qaSources.textContent = '';
                return;
            }
            qaAskBtn.disabled = true;
            qaAnswer.textContent = '正在检索报告，请稍候…';
            qaSources.textContent = '';
            try {
                const res = await postAskWithRetry({ question, province }, 1);
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || '请求失败');
                }
                qaAnswer.textContent = (data.mode === 'agent' ? '[Agent] ' : '') + (data.answer || '未获取到回答。');
                const list = Array.isArray(data.sources) ? data.sources : [];
                qaSources.innerHTML = list.length
                    ? '参考来源：' + list.map((s) => `<a href="${encodeURI(s.file)}" target="_blank" rel="noopener">${s.province}</a>`).join(' · ')
                    : '参考来源：无';
            } catch (err) {
                const fallback = await fallbackAsk(question, province);
                qaAnswer.textContent = fallback.answer;
                const list = Array.isArray(fallback.sources) ? fallback.sources : [];
                qaSources.innerHTML = list.length
                    ? '参考来源：' + list.map((s) => `<a href="${encodeURI(s.file)}" target="_blank" rel="noopener">${s.province}</a>`).join(' · ')
                    : '参考来源：无';
            } finally {
                qaAskBtn.disabled = false;
            }
        }

        async function init() {
            try {
                const res = await fetch('reports.json', { cache: 'no-store' });
                reports = await res.json();
            } catch (e) {
                // 如果拉取失败，所有省份默认显示“待上线”
                console.warn('Failed to load reports.json', e);
                reports = {};
            }
            render();
        }

        q.addEventListener('input', render);
        qaAskBtn.addEventListener('click', askQuestion);
        qaQuestion.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') askQuestion();
        });
        initQaProvinceOptions();
        init();
    </script>
</body>
</html>
